[pytest]
# 1. Path configuration
# This allows 'from bank_account import BankAccount' instead of 'from src.bank_account...'
pythonpath = src

# 2. Test discovery
# Tells pytest to look inside the 'tests' folder
testpaths = tests

# 3. Execution Options
# -v: Verbose (shows test names)
# -ra: Summary of all non-passed tests at the end
# --strict-markers: Errors out if you use a marker not defined below
addopts = -v -ra --strict-markers

# 4. Marker Registration
# This prevents warnings when using @pytest.mark.unit or @pytest.mark.integration
markers =
    unit: Tests for individual classes in isolation
    integration: Tests for the interaction between Account, Transaction, and Logger