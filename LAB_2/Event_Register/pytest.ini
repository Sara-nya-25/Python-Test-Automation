[pytest]
# 1. Essential: Tells pytest that 'src' is the root for imports.
# This fixes the "ModuleNotFoundError"
pythonpath = src

# 2. Tell pytest where your test files are located.
testpaths = tests

# 3. Default display options:
# -v: Verbose (shows every test name)
# -ra: Show extra summary info for all tests except passed ones
# --strict-markers: Raise error if you use a marker not defined below
addopts = -v -ra --strict-markers

# 4. Define custom markers to organize your tests
markers =
    unit: Quick tests for individual classes
    integration: Tests for class interactions (like Cart + Inventory)
    payment: Tests involving the PaymentGateway mocks