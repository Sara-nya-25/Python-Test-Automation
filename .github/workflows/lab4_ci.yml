name: 04_Linting_Benchmark CI Pipeline

on:
  push:
    branches: [ main ]
    # Updated path to watch for changes in the renamed folder
    paths:
      - '04_linting_benchmark/**'
  pull_request:
    branches: [ main ]
    paths:
      - '04_linting_benchmark/**'

jobs:
  test-lab-4:
    runs-on: ubuntu-latest

    # This tells GitHub to run all commands inside the new folder name
    defaults:
      run:
        working-directory: ./04_linting_benchmark

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: pytest -m unit

    - name: Run Integration Tests
      run: pytest -m integration

    # Optional: Since we set up Pylint, it's a great idea to add a linting step here!
    - name: Run Linting
      run: pylint src/ tests/