name: LAB_4 CI Pipeline

on:
  push:
    branches: [ main ]
    # Only trigger if files in LAB_4 change
    paths:
      - 'LAB_4/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'LAB_4/**'

jobs:
  test-lab-4:
    runs-on: ubuntu-latest

    # This tells GitHub to run all 'run' commands inside the LAB_4 folder
    defaults:
      run:
        working-directory: ./LAB_4

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: pytest -m unit

    - name: Run Integration Tests
      run: pytest -m integration