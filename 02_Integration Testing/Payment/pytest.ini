[pytest]
# 1. Path to your source code
pythonpath = src

# 2. Path to your test files
testpaths = tests

# 3. Execution flags
# -v: Verbose output
# -ra: Summary of all results
# --strict-markers: Prevents typos in markers
addopts = -v -ra --strict-markers

# 4. Marker registration
markers =
    integration: Tests for the flow between Order and PaymentGateway
    unit: Tests for single methods in isolation